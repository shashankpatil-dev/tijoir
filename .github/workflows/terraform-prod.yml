name: Terraform Production

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-prod.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform-prod.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_WORKING_DIR: infra/terraform/envs/prod
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_VAR_allowed_cors_origins: ${{ vars.ALLOWED_CORS_ORIGINS_JSON || '["*"]' }}
  TF_VAR_google_client_id: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
  TF_VAR_notification_email_enabled: ${{ vars.NOTIFICATION_EMAIL_ENABLED || 'false' }}
  TF_VAR_notification_email_provider: ${{ vars.NOTIFICATION_EMAIL_PROVIDER || 'noop' }}
  TF_VAR_notification_email_from_address: ${{ vars.NOTIFICATION_EMAIL_FROM_ADDRESS || 'no-reply@localhost' }}
  TF_VAR_notification_expose_dev_tokens: ${{ vars.NOTIFICATION_EXPOSE_DEV_TOKENS || 'true' }}

jobs:
  terraform:
    name: Terraform plan/apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS role secret
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "AWS_ROLE_ARN secret is missing."
            exit 1
          fi

          if ! printf '%s' "$AWS_ROLE_ARN" | grep -Eq '^arn:aws:iam::[0-9]{12}:role/.+'; then
            echo "AWS_ROLE_ARN must look like arn:aws:iam::123456789012:role/role-name."
            echo "Do not include quotes, output labels, JSON, or only the role name."
            exit 1
          fi

          echo "AWS_ROLE_ARN shape looks valid."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Show AWS identity
        run: |
          aws sts get-caller-identity
          echo "AWS_REGION=${AWS_REGION}"
          aws configure list

      - name: Resolve backend deployment inputs
        env:
          FALLBACK_BACKEND_IMAGE_TAG: ${{ vars.BACKEND_IMAGE_TAG || 'bootstrap' }}
          FALLBACK_ENABLE_BACKEND_LAMBDA: ${{ vars.ENABLE_BACKEND_LAMBDA || 'false' }}
        run: |
          CURRENT_IMAGE_URI="$(aws lambda get-function \
            --function-name tijoir-prod-backend \
            --region "$AWS_REGION" \
            --query 'Code.ImageUri' \
            --output text 2>/dev/null || true)"

          if [ -n "$CURRENT_IMAGE_URI" ] && [ "$CURRENT_IMAGE_URI" != "None" ] && [ "$CURRENT_IMAGE_URI" != "null" ]; then
            echo "Preserving deployed backend Lambda image: $CURRENT_IMAGE_URI"
            echo "TF_VAR_enable_backend_lambda=true" >> "$GITHUB_ENV"
            echo "TF_VAR_backend_image_tag=${CURRENT_IMAGE_URI##*:}" >> "$GITHUB_ENV"
          else
            echo "No deployed backend Lambda found."

            if [ "$FALLBACK_ENABLE_BACKEND_LAMBDA" = "true" ] && [ "$FALLBACK_BACKEND_IMAGE_TAG" != "bootstrap" ]; then
              echo "Using explicit backend workflow variables to recreate Lambda with image tag: $FALLBACK_BACKEND_IMAGE_TAG"
              echo "TF_VAR_enable_backend_lambda=true" >> "$GITHUB_ENV"
              echo "TF_VAR_backend_image_tag=$FALLBACK_BACKEND_IMAGE_TAG" >> "$GITHUB_ENV"
            else
              echo "No valid backend image tag configured for infra-only apply. Disabling backend Lambda in this workflow run."
              echo "TF_VAR_enable_backend_lambda=false" >> "$GITHUB_ENV"
              echo "TF_VAR_backend_image_tag=bootstrap" >> "$GITHUB_ENV"
            fi
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Write backend config
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "prod/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Ensure invoke-via-Function-URL permission
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.TF_VAR_enable_backend_lambda == 'true'
        run: |
          aws lambda add-permission \
            --function-name tijoir-prod-backend \
            --region "$AWS_REGION" \
            --statement-id AllowPublicInvokeViaFunctionUrl \
            --action lambda:InvokeFunction \
            --principal '*' \
            --invoked-via-function-url \
            >/dev/null 2>&1 || true
