name: Backend Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-prod-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_WORKING_DIR: infra/terraform/envs/prod
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_VAR_backend_image_tag: ${{ github.sha }}
  TF_VAR_enable_backend_lambda: "true"
  TF_VAR_allowed_cors_origins: ${{ vars.ALLOWED_CORS_ORIGINS_JSON || '["*"]' }}
  TF_VAR_google_client_id: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
  TF_VAR_notification_email_enabled: ${{ vars.NOTIFICATION_EMAIL_ENABLED || 'true' }}
  TF_VAR_notification_email_provider: ${{ vars.NOTIFICATION_EMAIL_PROVIDER || 'ses' }}
  TF_VAR_notification_email_from_address: ${{ vars.NOTIFICATION_EMAIL_FROM_ADDRESS || 'shashankpatil.dev@gmail.com' }}
  TF_VAR_notification_expose_dev_tokens: ${{ vars.NOTIFICATION_EXPOSE_DEV_TOKENS || 'false' }}

jobs:
  deploy:
    name: Build image, push ECR, apply Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests with coverage
        working-directory: backend
        run: mvn -B verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
          if-no-files-found: error

      - name: Validate AWS role secret
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "AWS_ROLE_ARN secret is missing."
            exit 1
          fi

          if ! printf '%s' "$AWS_ROLE_ARN" | grep -Eq '^arn:aws:iam::[0-9]{12}:role/.+'; then
            echo "AWS_ROLE_ARN must look like arn:aws:iam::123456789012:role/role-name."
            echo "Do not include quotes, output labels, JSON, or only the role name."
            exit 1
          fi

          echo "AWS_ROLE_ARN shape looks valid."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Show AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Write backend config
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "prod/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Read ECR repository URL
        id: ecr
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: echo "repository_url=$(terraform output -raw backend_ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.repository_url }}
        run: |
          REGISTRY_HOST="$(printf '%s' "$ECR_REGISTRY" | cut -d/ -f1)"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY_HOST"

      - name: Build backend Lambda image
        env:
          REPOSITORY_URL: ${{ steps.ecr.outputs.repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -f backend/Dockerfile.lambda -t "$REPOSITORY_URL:$IMAGE_TAG" backend

      - name: Push backend Lambda image
        env:
          REPOSITORY_URL: ${{ steps.ecr.outputs.repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: docker push "$REPOSITORY_URL:$IMAGE_TAG"

      - name: Terraform plan with pushed image
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply production Lambda
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Ensure invoke-via-Function-URL permission
        run: |
          aws lambda add-permission \
            --function-name tijoir-prod-backend \
            --region "$AWS_REGION" \
            --statement-id AllowPublicInvokeViaFunctionUrl \
            --action lambda:InvokeFunction \
            --principal '*' \
            --invoked-via-function-url \
            >/dev/null 2>&1 || true

      - name: Show production outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output backend_function_url
          terraform output frontend_url
