spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:tijoir-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

tijoir:
  security:
    jwt-secret: test-jwt-secret-change-me-0123456789abcdef
    local-secret-encryption-key: test-encryption-key-change-me
    # Tests simulate a behind-proxy deployment via X-Forwarded-For to exercise per-IP limits.
    trust-forwarded-headers: true
  notifications:
    enabled: true
    expose-dev-tokens: true
    email:
      enabled: true
      provider: noop
      verification:
        enabled: true
      invites:
        enabled: true
