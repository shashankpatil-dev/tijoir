spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:tijoir-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

tijoir:
  redis:
    enabled: true
    rate-limit:
      enabled: true
    idempotency:
      enabled: true
    summary-cache:
      enabled: true
    policy-cache:
      enabled: true
    abuse-protection:
      enabled: true
    mfa:
      enabled: true
  notifications:
    enabled: true
    expose-dev-tokens: true
    email:
      enabled: true
      provider: noop
      verification:
        enabled: true
      invites:
        enabled: true
