spring:
  application:
    name: tijoir-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tijoir}
    username: ${DATABASE_USERNAME:tijoir}
    password: ${DATABASE_PASSWORD:tijoir}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

tijoir:
  app:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}
  security:
    jwt-secret: ${JWT_SECRET:}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}
    email-verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    organization-invite-expiration-hours: ${ORGANIZATION_INVITE_EXPIRATION_HOURS:72}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:tijoir_refresh}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Strict}
    local-secret-encryption-key: ${LOCAL_SECRET_ENCRYPTION_KEY:}
  aws:
    region: ${AWS_REGION:ap-south-1}
    database-secret-arn: ${DATABASE_SECRET_ARN:}
    app-secret-name-prefix: ${APP_SECRET_NAME_PREFIX:tijoir/local/app/}
    kms-key-id: ${AWS_KMS_KEY_ID:}
  notifications:
    enabled: ${TIJOIR_NOTIFICATIONS_ENABLED:true}
    expose-dev-tokens: ${TIJOIR_NOTIFICATIONS_EXPOSE_DEV_TOKENS:false}
    email:
      enabled: ${TIJOIR_NOTIFICATION_EMAIL_ENABLED:true}
      provider: ${TIJOIR_NOTIFICATION_EMAIL_PROVIDER:noop}
      from-address: ${TIJOIR_NOTIFICATION_EMAIL_FROM_ADDRESS:no-reply@localhost}
      verification:
        enabled: ${TIJOIR_NOTIFICATION_EMAIL_VERIFICATION_ENABLED:true}
      invites:
        enabled: ${TIJOIR_NOTIFICATION_EMAIL_INVITES_ENABLED:true}
