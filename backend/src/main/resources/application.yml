spring:
  application:
    name: tijoir-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tijoir}
    username: ${DATABASE_USERNAME:tijoir}
    password: ${DATABASE_PASSWORD:tijoir}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8080}

tijoir:
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-local-env}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}
    email-verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    organization-invite-expiration-hours: ${ORGANIZATION_INVITE_EXPIRATION_HOURS:72}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:tijoir_refresh}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
    local-secret-encryption-key: ${LOCAL_SECRET_ENCRYPTION_KEY:local-dev-secret-encryption-key-change-me}
  aws:
    region: ${AWS_REGION:ap-south-1}
    database-secret-arn: ${DATABASE_SECRET_ARN:}
    app-secret-name-prefix: ${APP_SECRET_NAME_PREFIX:tijoir/local/app/}
    security-control-table-name: ${SECURITY_CONTROL_TABLE_NAME:}
    kms-key-id: ${AWS_KMS_KEY_ID:}
  redis:
    enabled: ${TIJOIR_REDIS_ENABLED:false}
    share-link-lock:
      enabled: ${TIJOIR_REDIS_SHARE_LINK_LOCK_ENABLED:false}
    rate-limit:
      enabled: ${TIJOIR_REDIS_RATE_LIMIT_ENABLED:false}
    idempotency:
      enabled: ${TIJOIR_REDIS_IDEMPOTENCY_ENABLED:false}
      ttl-hours: ${TIJOIR_REDIS_IDEMPOTENCY_TTL_HOURS:24}
      lock-seconds: ${TIJOIR_REDIS_IDEMPOTENCY_LOCK_SECONDS:30}
    summary-cache:
      enabled: ${TIJOIR_REDIS_SUMMARY_CACHE_ENABLED:false}
      ttl-seconds: ${TIJOIR_REDIS_SUMMARY_CACHE_TTL_SECONDS:20}
    policy-cache:
      enabled: ${TIJOIR_REDIS_POLICY_CACHE_ENABLED:false}
      ttl-seconds: ${TIJOIR_REDIS_POLICY_CACHE_TTL_SECONDS:60}
    abuse-protection:
      enabled: ${TIJOIR_REDIS_ABUSE_PROTECTION_ENABLED:false}
    mfa:
      enabled: ${TIJOIR_REDIS_MFA_ENABLED:false}
      ttl-seconds: ${TIJOIR_REDIS_MFA_TTL_SECONDS:300}
