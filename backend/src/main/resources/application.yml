spring:
  application:
    name: tijoir-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tijoir}
    username: ${DATABASE_USERNAME:tijoir}
    password: ${DATABASE_PASSWORD:tijoir}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8080}

tijoir:
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-local-env}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}
    email-verification-expiration-minutes: ${EMAIL_VERIFICATION_EXPIRATION_MINUTES:30}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    local-secret-encryption-key: ${LOCAL_SECRET_ENCRYPTION_KEY:local-dev-secret-encryption-key-change-me}
  aws:
    region: ${AWS_REGION:ap-south-1}
    database-secret-arn: ${DATABASE_SECRET_ARN:}
    app-secret-name-prefix: ${APP_SECRET_NAME_PREFIX:tijoir/local/app/}
    security-control-table-name: ${SECURITY_CONTROL_TABLE_NAME:}
    kms-key-id: ${AWS_KMS_KEY_ID:}
