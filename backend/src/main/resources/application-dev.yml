spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.tijoir: DEBUG

# Dev-only values so local dev works out of the box without external secrets.
# Production MUST supply its own via environment (base profile ships no usable defaults).
tijoir:
  security:
    jwt-secret: dev-jwt-secret-change-me-0123456789abcdef
    local-secret-encryption-key: dev-encryption-key-change-me
    refresh-cookie-secure: false
    refresh-cookie-same-site: Lax
  notifications:
    expose-dev-tokens: true
